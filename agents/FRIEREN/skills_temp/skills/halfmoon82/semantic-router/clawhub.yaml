---
# Semantic Router v7.7 - Phase 3 Stability Enhancement

name: semantic-router
version: 7.9.4

metadata:
  title: "Semantic Router — 让你的 AI 代理学会自己选模型"
  powered_by: "halfmoon82"
  attribution: "🔷 Powered by halfmoon82 🔷"
  description: |
    根据对话内容自动选择最合适的模型。不需要手动切换，不需要记命令。
    
    🔷 Powered by halfmoon82 🔷
    
    核心能力：
    🛡️ 系统消息过滤 — heartbeat/cron/slash 命令不再误触路由
    🔑 关键词精准匹配 — "写代码"→智能池，"查天气"→高速池
    📊 语义向量分析 — 本地 embedding 判断话题连续性
    ⚡ 全自动 Fallback — 主力挂了自动切备用，定时回切
    🎯 追问识别增强 — "完成了吗"、"怎么样"等追问正确识别为延续
    
    四层识别 → 三池架构 → 五分支路由 → 完全自动化
  
  author: halfmoon82
  homepage: https://clawhub.ai/halfmoon82/semantic-router
  repository: https://github.com/halfmoon82/semantic-router
  
  tags:
    - semantic-routing
    - model-pools
    - task-classification
    - system-passthrough
    - fallback-recovery
    - auto-model-selection
    - production
  
  categories:
    - AI Agent
    - Productivity
    - Development Tools
  
  keywords:
    - 语义路由
    - 自动模型选择
    - 模型池
    - 系统消息过滤
    - heartbeat
    - 生产级

requirements:
  openclaw:
    minimum: "0.12.0"
    recommended: "0.13.0"
  
  system:
    python: "3.9+"
    disk_space_mb: 50
    memory_mb: 256

permissions:
  required:
    - read_config
    - write_config
    - manage_cron
    - access_logs
    - execute_scripts
  
  optional:
    - send_notifications
    - access_external_api

dependencies:
  - name: python-packages
    items:
      - sentence-transformers (>=2.0.0)
      - numpy (>=1.21.0)
      - python-docx (>=0.8.11)

# 确保打包时包含所有必要目录
include:
  - "**/*"

files:
  - path: SKILL.md
    type: documentation
    description: 技能说明与快速开始指南
  
  - path: README_v3_PRODUCTION.md
    type: documentation
    description: 完整的生产部署指南（英文）
  
  - path: README_v7.2_生产部署指南_中文.docx
    type: documentation
    description: 完整的生产部署指南（中文，Office Word 格式）
  
  - path: scripts/semantic_check.py
    type: executable
    description: 核心语义检查脚本
    permissions: executable
  
  - path: scripts/setup_wizard.py
    type: executable
    description: 交互式配置向导
    permissions: executable
  
  - path: config/pools.json
    type: configuration
    description: 三池模型配置模板
  
  - path: config/tasks.json
    type: configuration
    description: 任务类型与关键词定义
  

  - path: README_v7.9.2_设计哲学与演进史.md
    type: documentation
    description: 设计哲学与演进史（中文 Markdown）——完整踩坑历程与架构决策

  - path: README_v7.9.2_设计哲学与演进史.docx
    type: documentation
    description: 设计哲学与演进史（中文 Word 格式）

  - path: references/
    type: documentation
    description: 参考文档与架构说明

installation:
  pre_install:
    - Check Python version >= 3.9
    - Verify OpenClaw >= 0.12.0
  
  steps:
    - Clone to ~/.openclaw/workspace/skills/semantic-router/
    - Run: python3 ~/.openclaw/workspace/skills/semantic-router/scripts/setup_wizard.py
    - Review generated pools.json and tasks.json
    - Isolate existing Cron Jobs (optional but recommended)
    - Test: python3 ~/.openclaw/workspace/skills/semantic-router/scripts/semantic_check.py "测试"
    - Restart Gateway
  
  post_install:
    - Verify installation with test command
    - Check logs for any configuration issues
    - Enable monitoring and alerts

usage:
  basic: |
    # Test semantic check
    python3 ~/.openclaw/workspace/skills/semantic-router/scripts/semantic_check.py \
      "帮我写个Python爬虫" "Highspeed"
  
  setup: |
    # Interactive configuration
    python3 ~/.openclaw/workspace/skills/semantic-router/scripts/setup_wizard.py
  
  isolate_cron: |
    # Isolate existing Cron Job
    cron update {job_id} \
      --patch '{"sessionKey": null, "sessionTarget": "isolated"}'
  
  monitoring: |
    # Monitor routing decisions
    tail -f ~/.openclaw/logs/gateway.log | grep "semantic-router"

configuration:
  pools:
    type: json
    location: ~/.openclaw/workspace/.lib/pools.json
    editable: true
    description: Three-pool model configuration
    required_fields:
      - pools.Highspeed.primary
      - pools.Intelligence.primary
      - pools.Humanities.primary
  
  tasks:
    type: json
    location: ~/.openclaw/workspace/.lib/tasks.json
    editable: true
    description: Task types and keywords
    required_fields:
      - tasks.development.keywords
      - tasks.query.keywords
      - tasks.content.keywords

outputs:
  logs:
    - ~/.openclaw/logs/gateway.log
    - ~/.openclaw/workspace/.lib/semantic_check.log
    - ~/.openclaw/logs/semantic-webhook.log
  
  configs:
    - ~/.openclaw/workspace/.lib/pools.json
    - ~/.openclaw/workspace/.lib/tasks.json
    - ~/.openclaw/openclaw.json (modified)
  
  backups:
    - ~/.openclaw/backup/*.bak (automatic)

support:
  documentation:
    - Quick Start: SKILL.md
    - Full Guide: README_v3_PRODUCTION.md
    - 中文指南: README_v7.2_生产部署指南_中文.docx
    - Architecture: docs/INTELLIGENT_ROUTING_SYSTEM.md
    - Troubleshooting: docs/semantic-router/TROUBLESHOOTING.md
  
  contact:
    issues: https://clawhub.ai/halfmoon82/semantic-router/issues
    discussions: https://clawhub.ai/halfmoon82/semantic-router/discussions

testing:
  unit_tests:
    - semantic_check_keyword_detection
    - semantic_check_context_similarity
    - fallback_chain_validation
    - config_merge_logic
  
  integration_tests:
    - cron_job_isolation
    - model_pool_switching
    - session_reset_behavior
    - configuration_conflict_resolution
  
  manual_tests:
    - Run setup_wizard and verify output
    - Isolate a real Cron Job and monitor
    - Test routing with various inputs
    - Verify configuration merging

changelog:
  "7.9.4":
    date: 2026-03-07
    breaking_changes: []
    new_features: []
    improvements:
      - "Skill Trigger 注入文本移除 dispatch_id 动态字段（Trigger/Retry/Degraded 三处）：dispatch_id 仍保留在系统日志和 skill_trigger_exec_log.jsonl 中，不影响追踪能力。消除 input-side prependContext 每轮变化，M1 combinedKey 完全稳定，LLM prefix cache 命中率显著提升。"
      - "Skill Trigger 注入文本移除 SKILL_NOT_APPLICABLE 输出指令：LLM 不再被要求在回复首行输出动态声明文本。技能不适用或无关时直接忽略并正常回复，消除 output-side 动态前缀，进一步提升 LLM 回复的 cache 稳定性。"
    bug_fixes:
      - "Fixed: dispatch_id in Skill Trigger prependContext caused M1 cache miss on every turn even when skill and routing state were unchanged."
      - "Fixed: SKILL_NOT_APPLICABLE directive caused assistant reply first-line to vary per-turn, breaking output-side prefix cache."

  "7.9.3":
    date: 2026-03-06
    breaking_changes: []
    new_features:
      - "新增《设计哲学与演进史》README（中文 Markdown + Word 双格式）：完整记录五大踩坑历程、架构决策与设计哲学"
    improvements:
      - "clawhub.yaml files 列表补全所有文档条目"
      - "package.json description 更新为四池架构描述"
    bug_fixes: []

  "7.9.2":
    date: 2026-03-06
    breaking_changes: []
    new_features:
      - "四池架构：新增 Agentic 池（primary: gpt-5.4），专为长上下文代理、Computer Use、专业知识工作设计"
      - "trigger_groups_all 非连续词组命中接入 keyword_match()：支持口语化分组规则，分组内 OR、规则内 AND、多规则 OR"
      - "agentic_tasks 任务类型：20+ 关键词 + 2条非连续规则，覆盖操作电脑/处理报告/制作PPT等场景"
      - "development 任务类型新增非连续规则：(帮我|写|实现|建) AND (功能|模块|工具|程序|系统) 提升口语命中率"
    improvements:
      - "automation 任务关键词清理：移除与 agentic_tasks 重叠的'自动化'词，职责分明"
      - "config/tasks.json 和 config/pools.json 同步至生产最新版本"
      - "声明剥离机制（_sanitize_context_text）已确认覆盖路由标签、Skill Trigger 声明、系统注入提示，防止声明词污染关键词匹配"
    bug_fixes: []

  "7.9.1":
    date: 2026-03-06
    breaking_changes: []
    new_features:
      - "Option C routing tag: extractStableRoutingParts() extracts pool/model/sessionType from
        declarationText and injects routingInstruction into prependContext for channel sessions.
        LLM outputs 【语义检查·路由】{pool}｜{model}｜{sessionType} as first line of reply."
      - "sessionType field: '延续' vs '新对话' derived from P\\d+-XXX branch label in
        declarationText. Stable within same pool/model segment → M1 prefix cache preserved."
    improvements:
      - "isChannelSession now excludes :subagent: sessions in addition to :cron:. Prevents
        subagent sessions (agent:main:subagent:xxx) from receiving routingInstruction and
        outputting the routing tag twice in Discord/Telegram replies."
      - "M1 combinedKey updated to include routingTagKey (rt:{pool}:{model}:{sessionType}).
        Same pool+model+sessionType across turns → identical prependContext → LLM prefix cache hit."
      - "pickReplyTextField supports messages array traversal (__messages__ virtual key) for
        agent_end events that carry reply content in messages[last].content instead of top-level fields."
    bug_fixes:
      - "Fixed senderRole empty-string causing applyOutboundDeclarationGuard to exit early:
        changed 'senderRole !== user' to 'senderRole && senderRole !== user' so agent_end
        events with no sender_role field (empty string) are allowed through."
      - "Fixed routing tag appearing twice in Discord replies: subagent sessions matching
        startsWith('agent:main:') were incorrectly injected with routingInstruction.
        Added :subagent: exclusion to isChannelSession check."

  "7.9.0":
    date: 2026-03-05
    breaking_changes: []
    new_features:
      - "is_context_dependent_question(): 疑问句+省略主语结构检测函数"
      - "依赖上下文补偿机制: 满足条件的疑问句在分级判定前 score +0.25"
    improvements:
      - "task_jump_penalty() 疑问句豁免: 短疑问/省略主语句型强制返回 1.0，不施加跳变惩罚"
      - "误触率显著降低: '我的需要重启网关生效吗？' 类省略主语追问 grade new_session→continue"
    bug_fixes:
      - "修复省略主语疑问句误触 C-auto: embedding语义距离大 + task_jump_penalty(0.55)叠加导致score<0.30触发C-auto"
      - "测试通过: 原始误触案例 score 0.14→0.736(continue), 真正新话题不受影响(new_session)"

  "7.8.2":
    date: 2026-03-05
    breaking_changes: []
    bug_fixes:
      - "Fixed recursive Skill Trigger dispatch loop: Skill Trigger and semantic-check declarations
        were leaking back into routing input, causing fit_gate to re-score the skill name/dispatch_id
        as user topic and trigger a second dispatch. Fixed by stripping 【Skill Trigger】 and its
        boilerplate lines in strip_declaration_injection() and _sanitize_context_text() before
        any routing or embedding scoring. is_system_message() intentionally NOT modified —
        only the declaration text is stripped, preserving full skill trigger capability."

  "7.7.1":
    date: 2026-03-05
    breaking_changes: []
    new_features: []
    improvements: []
    bug_fixes:
      - "Fixed recursive Skill Trigger dispatch loop: Skill Trigger and semantic-check declarations
        were leaking back into routing input, causing fit_gate to re-score the skill name/dispatch_id
        as user topic and trigger a second dispatch. Fixed by stripping 【Skill Trigger】 and its
        boilerplate lines in strip_declaration_injection() and _sanitize_context_text() before
        any routing or embedding scoring. is_system_message() intentionally NOT modified —
        only the declaration text is stripped, preserving full skill trigger capability."

  "7.7.0":
    date: 2026-03-03
    breaking_changes: []
    new_features:
      - "Phase 3 Stability Enhancement: Expanded continue keywords from 11 to 32"
      - "Added 21 follow-up/feedback keywords: 怎么样, 如何, 结果呢, 搞定没, 完成了吗, etc."
      - "Monitoring system with daily report cron (08:00 Asia/Shanghai)"
      - "Automatic misroute rate tracking and reporting"
    improvements:
      - "追问类消息识别率提升至 100% (测试通过: 干的怎么样了/完成了吗)"
      - "阈值配置与离线评估最优策略对齐 (0.50/0.30)"
    bug_fixes: []

  "7.6.2":
    date: 2026-03-02
    breaking_changes: []
    new_features:
      - "Session-level manual model lock/unlock override for main agent sessions."
    improvements:
      - "Declaration output restored globally for main agent sessions; subagents remain excluded."
      - "Live session-model reconciliation to reduce declaration vs /model drift."
    bug_fixes:
      - "Prevented current-message feedback into context scoring in both plugin and python fallback paths."

  "7.6.1":
    date: 2026-03-02
    breaking_changes: []
    improvements:
      - "B+C hardening: context window narrowed from 9 to 4 and task-type jump penalty added to reduce false-continue."
      - "Current-message exclusion hardened in both plugin and python fallback paths to stop self-feedback in context scoring."
      - "Declaration accuracy improved by preferring live session model before routing."
    bug_fixes:
      - "Fixed declaration/model mismatch caused by cache drift."

  "7.6.0":
    date: 2026-03-01
    breaking_changes: []
    new_features:
      - "Two-axis routing decision: task-keyword confidence determines pool, context novelty determines C vs C-auto"
      - "Layered context window (near+mid+far) to mitigate short-window blindness"
    improvements:
      - "Context sanitization for envelope/declaration noise before relevance scoring"
      - "Keyword-hit tasks can escalate to C-auto when context relevance is low"
      - "Expanded plugin-side user context extraction window from 5 to 9"
    bug_fixes:
      - "Reduced false-continue caused by polluted or too-short context slices"

  "7.4.2":
    date: 2026-03-01
    breaking_changes: []
    bug_fixes:
      - "Critical: Fixed self-comparison bug in context window — current message was included in the 3-message context, causing near-perfect similarity scores and preventing C-auto from ever triggering"
      - "get_recent_messages() now accepts exclude_input to skip the current message when building context"
    improvements:
      - C-auto branch now correctly fires for unrelated topics (verified with embedding score 0.26 < 0.30)

  "7.4.1":
    date: 2026-03-01
    breaking_changes: []
    improvements:
      - Embedding model upgraded from all-MiniLM-L6-v2 (384-dim) to bge-base-zh-v1.5 (768-dim)
      - Better Chinese semantic understanding with BAAI model
      - Thresholds adjusted (CONTINUE 0.40→0.50, WARN 0.20→0.30) for improved separation
      - Inference speed improved (~10ms → ~1.6ms per call)
    
  "7.4.0":
    date: 2026-03-01
    breaking_changes: []
    new_features:
      - System message passthrough filter (heartbeat, cron, slash commands)
      - Four-layer detection architecture (system → keyword → indicator → embedding)
      - Shield icon (🛡️) for system message declarations
    improvements:
      - Heartbeat no longer triggers C-auto session reset
      - Complete README rewrite with user-centric documentation
    bug_fixes:
      - Fixed heartbeat poll causing Telegram session reset every 30 minutes
      - Fixed cron event notifications triggering unwanted model switches
  
  "7.2.0":
    date: 2026-03-01
    breaking_changes: []
    new_features:
      - Session isolation rules for Cron Jobs
      - Conflict-free configuration merging
      - Complete troubleshooting guide
    improvements:
      - Better error messages
      - Automatic rollback on config failure
    bug_fixes:
      - Fixed session reset from concurrent Cron Jobs
      - Fixed config override issues
  
  "7.1.0":
    date: 2026-02-28
    new_features:
      - Priority correction (keyword > indicator > context)
      - Local embedding model (all-MiniLM-L6-v2)
      - Dual-channel scoring (Embedding + Jaccard)
  
  "7.0.0":
    date: 2026-02-26
    new_features:
      - Five-branch routing architecture
      - Three-pool model system
      - Fallback chain recovery

