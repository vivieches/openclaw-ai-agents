<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" rx="20" fill="#020203"/>
  <g transform="translate(50,52) scale(0.72)">
    <!-- body -->
    <ellipse cx="0" cy="0" rx="18" ry="13" fill="#F94144"/>
    <!-- head -->
    <ellipse cx="0" cy="-18" rx="12" ry="10" fill="#F94144"/>
    <!-- eyes -->
    <circle cx="-6" cy="-21" r="2.5" fill="#020203"/>
    <circle cx="6" cy="-21" r="2.5" fill="#020203"/>
    <circle cx="-5.2" cy="-21.5" r="1" fill="#ffffff"/>
    <circle cx="6.8" cy="-21.5" r="1" fill="#ffffff"/>
    <!-- antennae -->
    <line x1="-7" y1="-27" x2="-14" y2="-38" stroke="#F94144" stroke-width="2" stroke-linecap="round"/>
    <line x1="7" y1="-27" x2="14" y2="-38" stroke="#F94144" stroke-width="2" stroke-linecap="round"/>
    <!-- left claw arm -->
    <line x1="-16" y1="-6" x2="-30" y2="-14" stroke="#F94144" stroke-width="3.5" stroke-linecap="round"/>
    <!-- left claw top -->
    <path d="M-30,-14 Q-42,-10 -40,-2 Q-36,4 -28,-2 Z" fill="#F94144"/>
    <!-- left claw bottom -->
    <path d="M-30,-14 Q-40,-22 -38,-30 Q-33,-34 -28,-26 Z" fill="#c1121f"/>
    <!-- right claw arm -->
    <line x1="16" y1="-6" x2="30" y2="-14" stroke="#F94144" stroke-width="3.5" stroke-linecap="round"/>
    <!-- right claw top -->
    <path d="M30,-14 Q42,-10 40,-2 Q36,4 28,-2 Z" fill="#F94144"/>
    <!-- right claw bottom -->
    <path d="M30,-14 Q40,-22 38,-30 Q33,-34 28,-26 Z" fill="#c1121f"/>
    <!-- tail segments -->
    <ellipse cx="0" cy="11" rx="14" ry="7" fill="#c1121f"/>
    <ellipse cx="0" cy="21" rx="10" ry="6" fill="#F94144"/>
    <ellipse cx="0" cy="30" rx="7" ry="5" fill="#c1121f"/>
    <!-- tail fan -->
    <ellipse cx="-12" cy="38" rx="7" ry="4" fill="#F94144" transform="rotate(-20,-12,38)"/>
    <ellipse cx="-5" cy="40" rx="7" ry="4" fill="#c1121f" transform="rotate(-8,-5,40)"/>
    <ellipse cx="5" cy="40" rx="7" ry="4" fill="#c1121f" transform="rotate(8,5,40)"/>
    <ellipse cx="12" cy="38" rx="7" ry="4" fill="#F94144" transform="rotate(20,12,38)"/>
    <!-- legs left -->
    <line x1="-12" y1="-2" x2="-24" y2="6" stroke="#c1121f" stroke-width="2" stroke-linecap="round"/>
    <line x1="-13" y1="4" x2="-25" y2="14" stroke="#c1121f" stroke-width="2" stroke-linecap="round"/>
    <line x1="-12" y1="10" x2="-22" y2="21" stroke="#c1121f" stroke-width="2" stroke-linecap="round"/>
    <!-- legs right -->
    <line x1="12" y1="-2" x2="24" y2="6" stroke="#c1121f" stroke-width="2" stroke-linecap="round"/>
    <line x1="13" y1="4" x2="25" y2="14" stroke="#c1121f" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="10" x2="22" y2="21" stroke="#c1121f" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
